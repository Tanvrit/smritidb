[package]
name = "smritidb-py"
version = "0.1.0"
edition = "2021"
license = "Apache-2.0"
description = "Smritidb Python bindings — pyo3 wrapper over the Rust core."
authors = ["Tanvrit Private Limited <opensource@tanvrit.com>"]
homepage = "https://smritidb.com"
repository = "https://github.com/Tanvrit/smritidb"
publish = false

[lib]
name = "_native"
crate-type = ["cdylib"]

[dependencies]
pyo3 = { version = "0.22", features = ["extension-module", "abi3-py39"] }
smritidb-core = { path = "../core-rs", version = "0.1.0" }
