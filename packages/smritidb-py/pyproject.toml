[build-system]
requires = ["maturin>=1.7,<2.0"]
build-backend = "maturin"

[project]
name = "smritidb"
version = "0.1.0"
description = "An open biology-inspired associative memory layer. Storage that remembers by partial cue, degrades like a hologram, and consolidates with use. Python bindings."
readme = "README.md"
requires-python = ">=3.9"
license = { text = "Apache-2.0" }
authors = [
    { name = "Tanvrit Private Limited", email = "opensource@tanvrit.com" },
]
keywords = [
    "associative-memory",
    "hyperdimensional-computing",
    "sparse-distributed-memory",
    "vector-symbolic-architectures",
    "semantic-search",
    "smriti",
]
classifiers = [
    "Programming Language :: Python :: 3",
    "Programming Language :: Rust",
    "License :: OSI Approved :: Apache Software License",
    "Topic :: Database",
    "Topic :: Scientific/Engineering :: Artificial Intelligence",
    "Intended Audience :: Developers",
    "Development Status :: 3 - Alpha",
]

[project.urls]
Homepage = "https://smritidb.com"
Repository = "https://github.com/Tanvrit/smritidb"
Issues = "https://github.com/Tanvrit/smritidb/issues"
Documentation = "https://smritidb.com"

[tool.maturin]
python-source = "python"
module-name = "smritidb._native"
features = ["pyo3/extension-module", "pyo3/abi3-py39"]
strip = true
